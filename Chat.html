<!DOCTYPE html>
<html>
<head>
    <title>Onescroll Chat</title>
    <style>
        body { 
            font-family: Arial; 
            background:#f2f2f2; 
            margin:0; 
            padding:0; 
            text-align:center; 
        }
        .topbar { 
            background:white; 
            padding:15px; 
            text-align:center; 
            font-size:22px; 
            font-weight:bold; 
            border-bottom:1px solid #ccc; 
        }
        #chat-box { 
            width: 90%; 
            height: 400px; 
            margin:20px auto; 
            background:white; 
            padding:10px; 
            overflow-y: scroll; 
            border-radius:10px; 
            box-shadow:0 0 5px rgba(0,0,0,0.2); 
        }
        #messageInput { 
            width:70%; 
            padding:10px; 
            margin-top:10px; 
        }
        button { 
            padding:10px 20px; 
            margin-top:10px; 
        }
        .message { 
            margin:5px; 
            padding:8px; 
            border-radius:8px; 
            background:#e1e1e1; 
            text-align:left; 
        }
        .username { 
            font-weight:bold; 
            margin-bottom:5px; 
        }
    </style>
</head>
<body>

<div class="topbar">Onescroll Chat</div>

<div id="chat-box"></div>

<input id="messageInput" placeholder="Type a message...">
<button onclick="sendMessage()">Send</button>

<!-- Firebase Scripts -->
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js"></script>

<script>
  // --- Firebase config (your project)
  const firebaseConfig = {
    apiKey: "AIzaSyBvH4fC_JjbRxhR33s2hWZjpiOVzg9V-Vw",
    authDomain: "onescroll-chat-cbb26.firebaseapp.com",
    databaseURL: "https://onescroll-chat-cbb26-default-rtdb.firebaseio.com",
    projectId: "onescroll-chat-cbb26",
    storageBucket: "onescroll-chat-cbb26.appspot.com",
    messagingSenderId: "641200455876",
    appId: "1:641200455876:web:f28440ef0a1c905ec2c991"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  const chatBox = document.getElementById("chat-box");

  // --- Send message function
  function sendMessage() {
      const msgInput = document.getElementById("messageInput");
      const message = msgInput.value.trim();
      if(message === "") return;

      db.ref("messages").push({
          username: "Lostchild",
          text: message,
          timestamp: Date.now()
      });

      msgInput.value = "";
  }

  // --- Listen for new messages in real-time
  db.ref("messages").on("child_added", function(snapshot){
      const msg = snapshot.val();
      const div = document.createElement("div");
      div.classList.add("message");
      div.innerHTML = `<div class="username">${msg.username}</div>${msg.text}`;
      chatBox.appendChild(div);
      chatBox.scrollTop = chatBox.scrollHeight;
  });
</script>

</body>
</html>
