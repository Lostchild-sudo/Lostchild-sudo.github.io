<!DOCTYPE html>
<html>
<head>
    <title>Onescroll Chat</title>
    <style>
        body { 
            font-family: Arial; 
            background:#f2f2f2; 
            margin:0; 
            padding:0; 
            text-align:center; 
        }
        .topbar { 
            background:white; 
            padding:15px; 
            text-align:center; 
            font-size:22px; 
            font-weight:bold; 
            border-bottom:1px solid #ccc; 
        }
        #chat-box { 
            width: 90%; 
            height: 400px; 
            margin:20px auto; 
            background:white; 
            padding:10px; 
            overflow-y: scroll; 
            border-radius:10px; 
            box-shadow:0 0 5px rgba(0,0,0,0.2); 
        }
        #messageInput { 
            width:70%; 
            padding:10px; 
            margin-top:10px; 
        }
        button { 
            padding:10px 20px; 
            margin-top:10px; 
        }

        /* Instagram-style messages */
        .message {
            margin:5px;
            padding:10px 15px;
            border-radius:20px;
            max-width:70%;
            display:inline-block;
            clear:both;
        }
        .message.self {
            background:#DCF8C6; /* green bubble */
            float:right;
            text-align:right;
        }
        .message.other {
            background:#FFFFFF; /* white bubble */
            float:left;
            text-align:left;
        }
        .message img {
            flex-shrink:0;
        }
        .username {
            font-weight:bold;
            margin-bottom:5px;
        }
    </style>
</head>
<body>

<div class="topbar">Onescroll Chat</div>

<div id="chat-box"></div>

<input id="messageInput" placeholder="Type a message...">
<button onclick="sendMessage()">Send</button>

<!-- Firebase Scripts -->
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js"></script>

<script>
  // --- Firebase config
  const firebaseConfig = {
    apiKey: "AIzaSyBvH4fC_JjbRxhR33s2hWZjpiOVzg9V-Vw",
    authDomain: "onescroll-chat-cbb26.firebaseapp.com",
    databaseURL: "https://onescroll-chat-cbb26-default-rtdb.firebaseio.com",
    projectId: "onescroll-chat-cbb26",
    storageBucket: "onescroll-chat-cbb26.appspot.com",
    messagingSenderId: "641200455876",
    appId: "1:641200455876:web:f28440ef0a1c905ec2c991"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();
  const chatBox = document.getElementById("chat-box");

  // --- Ask user for username
  let username = prompt("Enter your username:");
  if(!username || username.trim() === ""){
      username = "Lostchild";
  }

  // --- Ask user for profile picture
  let profilePic = prompt("Enter your profile picture URL (or leave blank for default):");
  if(!profilePic || profilePic.trim() === ""){
      profilePic = "https://i.pravatar.cc/40?img=1"; // default avatar
  }

  // --- Send message function
  function sendMessage() {
      const msgInput = document.getElementById("messageInput");
      const message = msgInput.value.trim();
      if(message === "") return;

      db.ref("messages").push({
          username: username,
          text: message,
          timestamp: Date.now(),
          profilePic: profilePic
      });

      msgInput.value = "";
  }

  // --- Listen for new messages (Instagram-style with profile pics)
  db.ref("messages").on("child_added", function(snapshot){
      const msg = snapshot.val();
      const div = document.createElement("div");

      // Assign class based on username
      if(msg.username === username){
          div.classList.add("message", "self");
      } else {
          div.classList.add("message", "other");
      }

      div.innerHTML = `
          <div style="display:flex; align-items:flex-start;">
              <img src="${msg.profilePic}" style="width:30px; height:30px; border-radius:50%; margin-right:8px;">
              <div>
                  <div class="username">${msg.username}</div>
                  ${msg.text}
              </div>
          </div>
      `;

      chatBox.appendChild(div);
      chatBox.scrollTop = chatBox.scrollHeight;
  });
</script>

</body>
</html>
