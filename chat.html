<!DOCTYPE html>
<!DOCTYPE html>
<html>
<head>
    <title>Chat • Onescroll</title>
    <style>
        body {
            font-family: Arial;
            background: #f0f0f0;
            margin: 0;
            padding: 0;
        }
        #messages {
            height: 80vh;
            overflow-y: scroll;
            padding: 15px;
            background: white;
        }
        .msg {
            margin-bottom: 10px;
            padding: 10px;
            background: #e8e8e8;
            border-radius: 8px;
        }
        #inputBox {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: white;
            padding: 10px;
            display: flex;
            gap: 10px;
        }
        input {
            flex: 1;
            padding: 10px;
            font-size: 16px;
        }
        button {
            padding: 10px 20px;
        }
    </style>
</head>
<body>

<div id="messages"></div>

<div id="inputBox">
    <input id="msgInput" placeholder="Write a message...">
    <button onclick="sendMessage()">Send</button>
</div>

<!-- Firebase (v9 Modular) -->
<script type="module">

    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, push, onChildAdded } 
    from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBvH4fC_JjbRxhR33s2hWZjpiOVzg9V-Vw",
        authDomain: "onescroll-chat-cbb26.firebaseapp.com",
        databaseURL: "https://onescroll-chat-cbb26-default-rtdb.firebaseio.com",
        projectId: "onescroll-chat-cbb26",
        storageBucket: "onescroll-chat-cbb26.appspot.com",
        messagingSenderId: "641200455876",
        appId: "1:641200455876:web:f28440ef0a1c905ec2c991"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const chatRef = ref(db, "messages");

    const username = localStorage.getItem("chatUsername") 
                     || prompt("Enter your chat name:");

    localStorage.setItem("chatUsername", username);

    // 📌 Send message
    window.sendMessage = function () {
        let msg = document.getElementById("msgInput").value;

        if (msg.trim() === "") return;

        push(chatRef, {
            user: username,
            message: msg
        });

        document.getElementById("msgInput").value = "";
    }

    // 📌 Listen for messages
    onChildAdded(chatRef, (snapshot) => {
        let data = snapshot.val();
        let container = document.getElementById("messages");

        let msgBox = document.createElement("div");
        msgBox.className = "msg";
        msgBox.textContent = data.user + ": " + data.message;

        container.appendChild(msgBox);
        container.scrollTop = container.scrollHeight;
    });

</script>

</body>
</html>
