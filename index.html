<!DOCTYPE html>
<html>
<head>
    <title>Onescroll</title>
    <style>
        body {
            font-family: Arial;
            background: #f2f2f2;
            margin: 0;
            padding: 0;
        }

        /* Top bar with spaced buttons */
        .topbar {
            background: white;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #ccc;
        }
        .topbar .title {
            font-size: 22px;
            font-weight: bold;
        }
        .topbar .buttons {
            display: flex;
            gap: 10px;
        }
        .topbar .buttons a {
            text-decoration: none;
            color: black;
            font-size: 14px;
            font-weight: normal;
            padding: 5px 10px;
            border-radius: 5px;
            background: #e1e1e1;
        }

        .post {
            background: white;
            margin: 15px;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 0 5px rgba(0,0,0,0.2);
        }
        .post img {
            width: 100%;
        }
        .username {
            padding: 10px;
            font-weight: bold;
        }
        .actions {
            padding: 10px;
        }
        .actions button {
            padding: 8px 12px;
            margin-right: 10px;
        }
    </style>
</head>
<body>

<div class="topbar">
    <div class="title">Onescroll</div>
    <div class="buttons">
        <a href="upload.html">Upload</a>
        <a href="chat.html">Chat</a>
    </div>
</div>

<div id="feed"></div>

<!-- Example posts -->
<div class="post">
    <div class="username">Lostchild</div>
    <img src="https://img.sanishtech.com/u/3ba3a27ed92d9f62c380856729a19727.jpg" alt="Post Image">
    <div class="actions">
        <button>Like</button>
        <button>Comment</button>
    </div>
</div>

<div class="post">
    <div class="username">Lostchild</div>
    <img src="https://img.sanishtech.com/u/10587de208f45df69cf0c5a7a74e06a7.jpg" alt="Post Image">
    <div class="actions">
        <button>Like</button>
        <button>Comment</button>
    </div>
</div>

<script>
    // Load posts from localStorage (if any)
    function loadPosts() {
        let posts = JSON.parse(localStorage.getItem("posts")) || [];
        let feed = document.getElementById("feed");
        posts.forEach(post => {
            let postHTML = `
                <div class="post">
                    <div class="username">${post.username}</div>
                    <img src="${post.image}">
                    <div class="actions">
                        <button>Like</button>
                        <button>Comment</button>
                    </div>
                </div>
            `;
            feed.innerHTML += postHTML;
        });
    }
    loadPosts();

    // Like button functionality
    document.querySelectorAll(".actions button:first-child").forEach(function(btn){
        btn.addEventListener("click", function(){
            let current = btn.innerText;
            if(current === "Like"){
                btn.innerText = "Liked ❤️";
            } else {
                btn.innerText = "Like";
            }
        });
    });

    // Comment button functionality
    document.querySelectorAll(".actions button:last-child").forEach(function(btn){
        btn.addEventListener("click", function(){
            let comment = prompt("Write your comment:");
            if(comment && comment.trim() !== ""){
                alert("Comment added: " + comment);
            }
        });
    });
</script>

</body>
</html>
