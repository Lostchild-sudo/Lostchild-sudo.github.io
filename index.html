<!DOCTYPE html>
<html>
<head>
    <title>Onescroll</title>
    <style>
        body {
            font-family: Arial;
            background: #f2f2f2;
            margin: 0;
            padding: 0;
        }
        .topbar {
            background: white;
            padding: 15px;
            text-align: center;
            font-size: 22px;
            font-weight: bold;
            border-bottom: 1px solid #ccc;
        }
        .post {
            background: white;
            margin: 15px;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 0 5px rgba(0,0,0,0.2);
        }
        .post img {
            width: 100%;
        }
        .username {
            padding: 10px;
            font-weight: bold;
        }
        .actions {
            padding: 10px;
        }
        .actions button {
            padding: 8px 12px;
            margin-right: 10px;
        }
    </style>
</head>
<body>

<div class="topbar">
    Onescroll
    <a href="upload.html" style="float:right; color:white; 
        font-size:14px; margin-right:10px;">Upload</a>
</div>

<div id="feed"></div>

<div class="post">
    <div class="username">Lostchild</div>
    <img src="images/pic1.jpg" alt="Post Image">
    <div class="actions">
        <button>Like</button>
        <button>Comment</button>
    </div>
</div>

<div class="post">
    <div class="username">Lostchild</div>
    <img src="images/pic2.jpg" alt="Post Image">
    <div class="actions">
        <button>Like</button>
        <button>Comment</button>
    </div>
</div>

    <script>
function loadPosts() {
    let posts = JSON.parse(localStorage.getItem("posts")) || [];

    let feed = document.getElementById("feed");

    posts.forEach(post => {
        let postHTML = `
            <div class="post">
                <div class="username">${post.username}</div>
                <img src="${post.image}">
                <div class="actions">
                    <button>Like</button>
                    <button>Comment</button>
                </div>
            </div>
        `;
        feed.innerHTML += postHTML;
    });
}
loadPosts();
    </script>

</body>
</html>
